<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PK_EA Trader</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.3/jquery.min.js"
        integrity="sha512-STof4xm1wgkfm7heWqFJVn58Hm3EtS31XFaagaa8VMReCXAkQnJZ+jEy8PCC/iT18dFy95WcExNHFTqLyp72eQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Prompt&display=swap');

        * {
            font-family: 'Prompt', sans-serif;
        }
        
        /* ตกแต่งช่องที่ล็อคไว้ให้ดูเป็นสีเทาชัดเจนขึ้น */
        input[readonly] {
            background-color: #e9ecef;
            cursor: not-allowed;
        }
    </style>

</head>

<body>
    <div class="container mt-3">
        <div class="mx-auto text-center mt-3">
            <i class='bx bxs-color bx-lg bx-football bx-tada' style='color:#ec6e14'></i>
            <h1>เข้าสู่ระบบใช้งาน</h1>
            
            <div class="mb-3 mt-3">
                <label for="id"><i class='bx bx-barcode-reader bx-sm' style='color:#1186ec'></i> เลขUID:[UID Number]</label>
                <input type="text" class="form-control text-center" id="id" maxlength="9" placeholder="กรอกเลข UID PU Prime ให้ถูกต้อง">
            </div>

            <div class="mb-3 mt-3">
                <label for="fname"><i class='bx bxs-user-pin bx-sm' style='color:#1186ec'></i> ชื่อผู้ใช้งาน (ดึงข้อมูลอัตโนมัติ)</label>
                <input type="text" class="form-control text-center text-primary fw-bold" id="fname" name="fname" placeholder="กำลังดึงข้อมูล..." readonly required>
            </div>
            
            <div class="text-center mt-4">
                <button type="button" class="btn btn-lg btn-primary w-75" id="submit-btn">เข้าสู่ระบบ</button>
                <button type="button" class="btn btn-lg btn-primary w-75" id="bt2" disabled>
                    <span class="spinner-grow spinner-grow-sm" role="status" aria-hidden="true"></span>
                    รอสักครู่...
                </button>
            </div>
        </div>
    </div>

<script>
    $("#bt2").hide();
    
    $(document).ready(() => {
        liff.init({
            liffId: '2009651859-UeYgZHD5',
            withLoginOnExternalBrowser: true
        });

        liff.ready.then(() => {
            // 1. ดึงชื่อโปรไฟล์จาก LINE มาใส่ในช่อง fname อัตโนมัติ
            liff.getProfile().then(profile => {
                $('#fname').val(profile.displayName);
            }).catch(err => {
                console.error('error', err);
                $('#fname').val('ไม่สามารถดึงข้อมูลได้');
            });

            // 2. ผูกปุ่มเข้าสู่ระบบกับฟังก์ชัน submit
            let btn = document.getElementById('submit-btn');
            btn.addEventListener('click', submit);
        });
    });

    function submit() {
        let id = $('#id').val().trim();
        let fname = $('#fname').val().trim();

        if(id != '' && fname != '') {
            $("#submit-btn").hide();
            $("#bt2").show();
            console.log('submit');

            let uid = liff.getDecodedIDToken().sub;
            
            $.post('https://script.google.com/macros/s/AKfycbxuRa1odY8o64xT8re2IYnvyJO6L5Z9F6PMkRNkfEBqW8Ur8tE6pGFOeQlx0BThQwLh/exec', { opt: 'register', id: id, fname: fname, uid: uid }, function (res) {
                if (res != 'yes') {
                    console.log(res);
                    // ปรับแก้ข้อความ Alert เล็กน้อย
                    alert('🚫เข้าสู่ระบบไม่สำเร็จ\nกรุณาตรวจสอบเลข UID ของคุณอีกครั้ง');
                    $("#submit-btn").show();
                    $("#bt2").hide();
                } else {
                    alert('✅เข้าสู่ระบบเรียบร้อยแล้ว');
                    $("#submit-btn").show();
                    $("#bt2").hide();
                    liff.closeWindow();
                }
            }).fail(function() {
                // เผื่อกรณี Google Apps Script โหลดไม่ขึ้น (กันปุ่มค้าง)
                alert('⚠️ ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์ได้ กรุณาลองใหม่อีกครั้ง');
                $("#submit-btn").show();
                $("#bt2").hide();
            });
        } else {
            alert('กรุณากรอกข้อมูลเลข UID ให้ครบถ้วน!!');
        }
    }
</script>
</body>
</html>
